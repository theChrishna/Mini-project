<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signfy Web</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #141414;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 2rem;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-container {
            position: relative;
            width: 1280px;
            max-width: 95vw;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background-color: #000;
            border: 1px solid #333;
        }

        .video-container img {
            width: 100%;
            display: block;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        button {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #3a3a3a;
            border-color: #666;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-action {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }
        
        .btn-action:hover {
            background-color: #e0e0e0;
            border-color: #e0e0e0;
        }

        .btn-danger {
            background-color: #3d1c1c;
            color: #ff6b6b;
            border-color: #5c2b2b;
        }
        
        .btn-danger:hover {
            background-color: #4f2525;
            border-color: #7a3a3a;
        }

        .toggle-on {
            border-left: 4px solid #4CAF50;
        }

        .toggle-off {
            border-left: 4px solid #f44336;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .record-panel {
            margin-top: 20px;
            padding: 15px 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .record-panel input {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            width: 200px;
        }

        .record-panel input:focus {
            outline: none;
            border-color: #888;
        }

        .btn-record {
            background-color: #ff3b3b;
            color: white;
            border: none;
            padding: 10px 20px;
        }

        .btn-record:hover {
            background-color: #ff5252;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Signfy</h1>
    </div>

    <div class="video-container">
        <!-- The video stream from Flask backend -->
        <img src="/video_feed" alt="Video Stream Loading...">
    </div>

    <div class="controls">
        <button id="btn-hand" class="toggle-on" onclick="toggleFeature('hand', this)">Hand Tracking</button>
        <button id="btn-emotion" class="toggle-on" onclick="toggleFeature('emotion', this)">Emotion Detection</button>
        <button id="btn-llm" class="toggle-on" onclick="toggleFeature('llm', this)">Gemini Translator</button>
        <button id="btn-voice" class="toggle-on" onclick="toggleFeature('voice', this)">Voice Output</button>
        
        <div style="width: 20px;"></div> <!-- Spacer -->
        
        <button class="btn-action" onclick="speakManual()">Speak Sentence</button>
        <button class="btn-danger" onclick="clearBuffer()">Clear Buffer</button>
    </div>

    <div class="record-panel">
        <input type="text" id="customWord" placeholder="Enter word to record..." autocomplete="off">
        <button class="btn-record" onclick="recordSign()">🔴 Record Custom Sign</button>
    </div>

    <div class="footer">
        Signfy ASL Translator &bull; Local Web App Engine
    </div>

    <script>
        // API Calls to Flask Backend
        async function toggleFeature(feature, element) {
            try {
                const response = await fetch('/api/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ feature: feature })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    if (data.state) {
                        element.classList.remove('toggle-off');
                        element.classList.add('toggle-on');
                    } else {
                        element.classList.remove('toggle-on');
                        element.classList.add('toggle-off');
                    }
                }
            } catch (error) {
                console.error("Error toggling feature:", error);
            }
        }

        async function clearBuffer() {
            try {
                await fetch('/api/clear', { method: 'POST' });
            } catch (error) {
                console.error("Error clearing buffer:", error);
            }
        }

        async function speakManual() {
            try {
                await fetch('/api/speak', { method: 'POST' });
            } catch (error) {
                console.error("Error speaking:", error);
            }
        }

        async function recordSign() {
            const wordInput = document.getElementById('customWord');
            const word = wordInput.value.trim();
            if (!word) {
                alert("Please enter a word to record!");
                return;
            }
            try {
                await fetch('/api/record', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });
                wordInput.value = "";
                // Give user a prompt to hold the sign
                setTimeout(() => {
                    alert("Stand still! Recording: " + word);
                }, 100);
            } catch (error) {
                console.error("Error recording sign:", error);
            }
        }
    </script>
</body>
</html>
